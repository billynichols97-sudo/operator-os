<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Operator OS</title>
  <style>
    :root {
      --bg: #0f1115;
      --panel: #171a21;
      --panel-2: #1f2430;
      --line: #2b3242;
      --text: #f3f5f7;
      --muted: #97a0af;
      --accent: #47c2a7;
      --accent-2: #7c8cff;
      --danger: #ff6b6b;
      --warning: #ffb84d;
      --success: #5dd39e;
      --radius: 18px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #0b0d12 0%, #11151d 100%);
      color: var(--text);
    }

    .app {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }

    .hero {
      background: linear-gradient(135deg, #171a21 0%, #202636 100%);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 20px;
    }

    .hero h1 {
      margin: 0 0 8px;
      font-size: 2rem;
    }

    .hero p {
      margin: 0;
      color: var(--muted);
    }

    .grid {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 20px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 18px;
      margin-bottom: 20px;
    }

    .card h2 {
      margin-top: 0;
      font-size: 1.1rem;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-top: 16px;
    }

    .stat {
      background: var(--panel-2);
      border-radius: 14px;
      padding: 14px;
      border: 1px solid var(--line);
    }

    .stat-label {
      color: var(--muted);
      font-size: 0.85rem;
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 1.5rem;
      font-weight: bold;
    }

    .task-list {
      display: grid;
      gap: 12px;
      margin-top: 14px;
    }

    .task {
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
    }

    .task-top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
    }

    .badge {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: bold;
    }

    .high { background: rgba(255, 107, 107, 0.15); color: #ff8c8c; }
    .medium { background: rgba(255, 184, 77, 0.15); color: #ffc46b; }
    .low { background: rgba(93, 211, 158, 0.15); color: #7ce0b0; }

    .muted {
      color: var(--muted);
      font-size: 0.92rem;
    }

    .mini-list {
      padding-left: 18px;
      color: var(--muted);
    }

    .mini-list li {
      margin-bottom: 8px;
    }

    .footer-note {
      margin-top: 8px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    @media (max-width: 860px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .stats {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <section class="hero">
      <h1>Operator OS</h1>
      <p>Your personal planner, task tracker, and workout command center.</p>

      <div class="stats">
        <div class="stat">
          <div class="stat-label">Top Priorities</div>
          <div class="stat-value">3</div>
        </div>
        <div class="stat">
          <div class="stat-label">Tasks Due Today</div>
          <div class="stat-value">5</div>
        </div>
        <div class="stat">
          <div class="stat-label">Workout Streak</div>
          <div class="stat-value">4</div>
        </div>
      </div>
    </section>

    <div class="grid">
      <div>
        <section class="card">
          <h2>Today’s Focus</h2>
          <div class="task-list">
            <div class="task">
              <div class="task-top">
                <strong>Finish Etsy product draft</strong>
                <span class="badge high">High</span>
              </div>
              <div class="muted">Outlet: Etsy • Category: Product • Time: 45 min</div>
            </div>

            <div class="task">
              <div class="task-top">
                <strong>Send automation outreach</strong>
                <span class="badge high">High</span>
              </div>
              <div class="muted">Outlet: AI Services • Category: Leads •
